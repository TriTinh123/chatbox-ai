<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Trang không tìm thấy · Revenue AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e2e0f0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 48px;
      color: #a78bfa; font-size: 15px; font-weight: 700; letter-spacing: .04em;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .code {
      font-size: 96px; font-weight: 800;
      background: linear-gradient(135deg, #7c3aed 30%, #ec4899);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #f1f0ff; }
    p  { font-size: 14px; color: #8b8a9e; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; text-decoration: none;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="12" width="4" height="10" rx="1.5" fill="white" opacity=".7"/>
          <rect x="8" y="7" width="4" height="15" rx="1.5" fill="white" opacity=".85"/>
          <rect x="14" y="3" width="4" height="19" rx="1.5" fill="white"/>
        </svg>
      </div>
      Revenue AI
    </a>
    <div class="code">404</div>
    <h1>Trang không tìm thấy</h1>
    <p>Địa chỉ bạn nhập không tồn tại hoặc đã bị di chuyển.<br>Hãy quay về trang chính để tiếp tục phân tích.</p>
    <a class="btn" href="/">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Về trang chính
    </a>
  </div>
</body>
</html>
