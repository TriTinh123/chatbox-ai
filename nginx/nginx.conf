upstream django {
    server web:8000;
    keepalive 32;
}

# Rate limiting zones  (per IP)
limit_req_zone  $binary_remote_addr  zone=api:10m    rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=upload:10m rate=10r/m;
limit_conn_zone $binary_remote_addr  zone=conn:10m;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Replace with your real certificate paths
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Size limits ───────────────────────────────────────────────────────────
    client_max_body_size 20M;
    client_body_timeout  30s;
    client_header_timeout 15s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Connection limit ─────────────────────────────────────────────────────
    limit_conn conn 20;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static files (WhiteNoise serves from /staticfiles/) ──────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SSE streaming endpoint — must disable buffering ──────────────────────
    location /api/stream/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE requires buffering off and long timeouts
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         300s;
        proxy_send_timeout         300s;
        chunked_transfer_encoding  on;
    }

    # ── File upload ──────────────────────────────────────────────────────────
    location /upload {
        limit_req zone=upload burst=5 nodelay;

        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # ── All other requests ────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering     on;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}
